<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>貸借対照表計算</title>
<style>
body { font-family: sans-serif; padding: 20px; }
input { margin: 5px; }
table { border-collapse: collapse; margin-top: 20px; }
td, th { border: 1px solid #333; padding: 8px; }
</style>
</head>
<body>

<h2>データ入力</h2>

B: <input id="B" type="number"><br>
V: <input id="V" type="number"><br>
O: <input id="O" type="number"><br>
r1: <input id="r1" type="number" step="0.01"><br>
r2: <input id="r2" type="number" step="0.01"><br>

<button onclick="sendData()">計算</button>

<h2>結果</h2>
<div id="result"></div>

<script>
async function sendData() {

  const B = Number(document.getElementById("B").value);
  const V = Number(document.getElementById("V").value);
  const O = Number(document.getElementById("O").value);
  const r1 = Number(document.getElementById("r1").value);
  const r2 = Number(document.getElementById("r2").value);

  const B1 = (B * V - O);

  const res = await fetch("【ここにApps ScriptのURL】", {
    method: "POST",
    body: JSON.stringify({ B1, B, V, O, r1, r2 })
  });

  const data = await res.json();

  const M1 = data.M1;
  const M2 = data.M2;

  const flowAssets = M1;
  const fixedAssets = Math.max(B - M1, 0);

  const flowLiabilities = M2;
  const capital = Math.max(B - M2, 0);

  const T1 = (fixedAssets / O);
  const T2 = (capital / O);

  document.getElementById("result").innerHTML = `
    <h3>貸借対照表</h3>
    <table>
      <tr>
        <th>借方</th>
        <th>貸方</th>
      </tr>
      <tr>
        <td>流動資産: ${flowAssets.toFixed(2)}</td>
        <td>流動負債: ${flowLiabilities.toFixed(2)}</td>
      </tr>
      <tr>
        <td>固定資産: ${fixedAssets.toFixed(2)}</td>
        <td>資本金: ${capital.toFixed(2)}</td>
      </tr>
    </table>

    <h3>指標</h3>
    T1: ${T1.toFixed(3)}<br>
    T2: ${T2.toFixed(3)}
  `;
}
</script>

</body>
</html>
